<!DOCTYPE html>
<html>
<head>
    <title>Loops in JavaScript</title>
</head>
<body>

<h2>JavaScript Loop Examples</h2>

<p id="output"></p>

<script>
let result = "";

// 1. For loop (1 to 10)
result += "For loop (1 to 10):<br>";
for (let i = 1; i <= 10; i++) {
    result += i + " ";
}

// 2. While loop (1 to 5)
result += "<br><br>While loop (1 to 5):<br>";
let j = 1;
while (j <= 5) {
    result += j + " ";
    j++;
}

//3. Do-while loop (1 to 3)
result += "<br><br>Do-while loop (1 to 3):<br>";
let k = 1;
do {
    result += k + " ";
    k++;
} while (k <= 3);

// 4. Continue & Break (skip 5, stop at 8)
result += "<br><br>Continue & Break (1 to 10):<br>";
for (let i = 1; i <= 10; i++) {
    if (i === 5) {
        continue; 
    }
    if (i === 8) {
        break;
    }
    result += i + " ";
}

// Display result
document.getElementById("output").innerHTML = result;
</script>

</body>
</html>
