<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
function placeOrder(bike) {
  return new Promise((resolve, reject) => {
    setTimeout(() => {
      if (bike) {
        resolve(`booked your bike: ${bike} deleverd soon... `);
      } else {
        reject("No item selected");
      }
    }, 3000);
  });
}

placeOrder("R15")
  .then(result => {
    console.log("Then:", result);
  })
  .catch(error => {
    console.log("Catch:", error);
  });



async function orderbike() {
  try {
    const result = await placeOrder("bike");
    console.log("Async/Await:", result);
  } catch (error) {
    console.log("Async/Await Error:", error);
  }finally { 
      
        console.log("order ready.") 
      } 
      
}


orderbike();
    </script>
</body>
</html>
