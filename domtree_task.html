<!DOCTYPE html>
<html>
<head>
  <title>DOM Manipulation</title>
</head>
<body>

<h2 id="title">Original Title</h2>

<p id="para">This is a paragraph.</p>

<button onclick="changeText()">Click Me</button>

<script>

// 1 Change text using getElementById
function changeText() {
  document.getElementById("title").textContent = "Text Changed machi 🔥";

  // 2 Select element & change style
  let para = document.getElementById("para");

  // 3 Change paragraph content
  para.textContent = "Paragraph updated successfully";

  // 4 Change color & font size
  para.style.color = "blue";
  para.style.fontSize = "22px";
}

</script>

</body>
</html>
