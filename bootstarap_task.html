<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Tasks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container my-4">

        <h1 class="text-center text-primary mb-4">Bootstrap Layout Example</h1>
        <div class="row text-center">

            <div class="col-lg-4 col-12 p-3 bg-light">
                <h3>Column 1</h3>
                <p>This is the first column.</p>
            </div>


            <div class="col-lg-4 col-12 p-3 bg-secondary text-white">
                <h3>Column 2</h3>
                <p>Main column with nested row.</p>

    
                <div class="row my-4">
                    <div class="col-6 bg-warning p-2">
                        Sub Column 1
                    </div>
                    <div class="col-6 bg-info p-2">
                        Sub Column 2
                    </div>
                </div>
            </div>

            <div class="col-lg-4 col-12 p-3 bg-light">
                <h3>Column 3</h3>
                <p>This is the third column.</p>
            </div>

        </div>

    </div>

</body>
</html>
